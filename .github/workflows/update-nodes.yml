name: Update Free Nodes

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Fetch and aggregate free nodes
        run: python scripts/update-nodes.py

      - name: Commit and push
        run: |
          git config user.name "xcai413"
          git config user.email "xcai413@users.noreply.github.com"
          git add free/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "🔄 自动更新免费节点 ($(date +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
